<html>
	<head>
		<title>Telephasic by HTML5 UP</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<link rel="stylesheet" href="assets/css/blog.css" />
	</head>
	<body class="no-sidebar is-preload">
		<div id="page-wrapper">

			<!-- Header -->
			<div id="header-wrapper">
				<div id = "testing"></div>
				<script>
				fetch('header.html')
					.then(response => response.text())
					.then(data => {
						document.getElementById('testing').innerHTML = data;
					})
					.catch(error => console.error('Error loading header:', error));
				</script>
			</div>

			<!-- Main -->
            <div class="wrapper">
                <div class="container" id="main">
					<div class="editor-container">
						<h2 class="blog-editor-title">Blog Editor</h2>
						
						<!-- Blog Title Input -->
						<label for="blog-title">Title:</label>
						<input type="text" id="blog-title" placeholder="Enter blog title..." oninput=updatePreview()>
						
						<!-- Blog Content Input -->
						<label for="blog-content">Content:</label>
						<textarea id="blog-content" placeholder="Write your blog content..." oninput=updatePreview()></textarea>
				
						<!-- Image Upload -->
						<label for="blog-image">Upload Image:</label>
						<div class="file-upload">
							<label for="blog-image" class="custom-file-label">📁 Choose an Image</label>
							<input type="file" id="blog-image" accept="image/*" onchange="addImage(event)">
							<span id="file-name">No file chosen</span>
						</div>
						
				
						<!-- Save Button -->
						<button class="btn" onclick="saveBlog()">Save Blog</button>
				
						<!-- Live Preview -->
						<div class="preview-container">
							<h3 id="preview-title">Live Preview</h3>
							<img id="preview-image">
							<p id="preview-content"></p>
						</div>
					</div>
                </div>
            </div>

			<!-- Footer -->
            <div id = "insert_footer"></div>
            <script>
                fetch('footer.html')
                    .then(response => response.text())
                    .then(data => {
                    	document.getElementById('insert_footer').innerHTML = data;
                    })
                    .catch(error => console.error('Error loading header:', error));
            </script>

		</div>

		<!-- Scripts -->
			<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/jquery.dropotron.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>
			<script src="assets/js/blog.js"></script>

	</body>
</html>
