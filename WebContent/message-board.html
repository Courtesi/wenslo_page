<html>
	<head>
		<title>Message Board</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<link rel="stylesheet" href="assets/css/extra.css" />
	</head>
	<body class="no-sidebar is-preload">
		<div id="page-wrapper">

			<!-- Header -->
			<div id="header-wrapper">
				<div id = "testing"></div>
				<script>
				fetch('header.html')
					.then(response => response.text())
					.then(data => {
						document.getElementById('testing').innerHTML = data;
					})
					.catch(error => console.error('Error loading header:', error));
				</script>
			</div>

			<!-- Main -->
				<div class="wrapper">
					<div class="container" id="main">
						<div id ="message_board" class="row features">
						</div>
					</div>
				</div>

			<!-- Footer -->
            <div id = "insert_footer"></div>
            <script>
                fetch('footer.html')
                    .then(response => response.text())
                    .then(data => {
                    	document.getElementById('insert_footer').innerHTML = data;

						document.querySelector("#messageForm input[type='submit']").addEventListener("click", function(event) {
							event.preventDefault();
							messageFormHandler();
						});
                    })
                    .catch(error => console.error('Error loading header:', error));
            </script>

			<script>
				window.onload = () => {
					fetchMessages();
				}
			</script>

		</div>

		<!-- Scripts -->
			<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/jquery.dropotron.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>
			<script src="assets/js/messages.js"></script>

	</body>
</html>
